<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowmaster Gun Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#e0e0e0;
font-family:Arial;
text-align:center;
}

#scoreboard{
position:absolute;
top:5px;
left:50%;
transform:translateX(-50%);
background:white;
padding:5px 15px;
border-radius:8px;
font-weight:bold;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="scoreboard">
Score: <span id="score">0</span> | Level: <span id="level">1</span>
</div>

<canvas id="gameCanvas"></canvas>

<audio id="audio1" src="audio1.mp3" loop></audio>
<audio id="audio2" src="audio2.mp3"></audio>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");

const audio1 = document.getElementById("audio1");
const audio2 = document.getElementById("audio2");

let archerImg = new Image();
archerImg.src="archer.png";

let targetImg = new Image();
targetImg.src="target.png";

let archer = {x:60,y:canvas.height-150,width:90,height:90};
let gunLength = 60;

let target = {
x:canvas.width-120,
y:50,
width:80,
height:80,
dir:1,
speed:3
};

let arrow = {
x:0,
y:0,
angle:0,
speed:14,
moving:false
};

let score=0;
let level=1;
let aimY=archer.y+40;

function startAudio(){
audio1.play().catch(()=>{});
window.removeEventListener("touchstart",startAudio);
window.removeEventListener("click",startAudio);
}

window.addEventListener("touchstart",startAudio);
window.addEventListener("click",startAudio);

canvas.addEventListener("touchmove",e=>{
e.preventDefault();
aimY=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("mousemove",e=>{
aimY=e.clientY;
});

canvas.addEventListener("touchstart",shoot);
canvas.addEventListener("click",shoot);

function shoot(){

if(!arrow.moving){

arrow.moving=true;

let gunX=archer.x+40;
let gunY=archer.y+45;

arrow.x=gunX;
arrow.y=gunY;

arrow.angle=Math.atan2(aimY-gunY,target.x-gunX);

}

}

function playHitSound(){

audio1.pause();
audio2.currentTime=0;
audio2.play();

audio2.onended=()=>{
audio1.play();
};

}

function drawTrajectory(){

let gunX=archer.x+40;
let gunY=archer.y+45;

let angle=Math.atan2(aimY-gunY,target.x-gunX);

ctx.setLineDash([6,6]);
ctx.strokeStyle="black";

ctx.beginPath();
ctx.moveTo(gunX,gunY);

for(let i=0;i<800;i+=20){

let x=gunX+Math.cos(angle)*i;
let y=gunY+Math.sin(angle)*i;

ctx.lineTo(x,y);

}

ctx.stroke();
ctx.setLineDash([]);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

archer.y=canvas.height-150;
target.x=canvas.width-120;

target.y+=target.dir*target.speed;

if(target.y<0||target.y>canvas.height-target.height){
target.dir*=-1;
}

ctx.drawImage(targetImg,target.x,target.y,target.width,target.height);

ctx.drawImage(archerImg,archer.x,archer.y,archer.width,archer.height);

let gunX=archer.x+40;
let gunY=archer.y+45;

let gunAngle=Math.atan2(aimY-gunY,target.x-gunX);

ctx.save();
ctx.translate(gunX,gunY);
ctx.rotate(gunAngle);

ctx.fillStyle="#555";
ctx.fillRect(0,-4,gunLength,8);
ctx.fillRect(-10,-2,10,4);

ctx.restore();

if(!arrow.moving){
drawTrajectory();
}

if(arrow.moving){

arrow.x+=Math.cos(arrow.angle)*arrow.speed;
arrow.y+=Math.sin(arrow.angle)*arrow.speed;

ctx.save();
ctx.translate(arrow.x,arrow.y);
ctx.rotate(arrow.angle);

ctx.fillStyle="black";
ctx.fillRect(0,-3,40,6);

ctx.restore();

if(
arrow.x>target.x &&
arrow.x<target.x+target.width &&
arrow.y>target.y &&
arrow.y<target.y+target.height
){

arrow.moving=false;

playHitSound();

score++;
level++;

scoreEl.textContent=score;
levelEl.textContent=level;

target.speed+=0.5;

}

if(
arrow.x>canvas.width||
arrow.y<0||
arrow.y>canvas.height
){
arrow.moving=false;
}

}

requestAnimationFrame(draw);

}

draw();

</script>
</body>
</html>
